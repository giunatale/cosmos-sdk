syntax = "proto3";
package cosmos.demurrage.v1;

option go_package = "github.com/cosmos/cosmos-sdk/x/demurrage/types";

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

// EventDemurrageEpoch is emitted once per epoch when the global accumulator is updated.
message EventDemurrageEpoch {
  string annual_rate = 1 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
  string per_epoch_rate = 2 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
  string global_accumulator = 3 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
  string bonding_ratio = 4 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
  int64 epoch_number = 5;
}

// EventDemurrageApplied is emitted when an account's balance is materialised (levy collected).
message EventDemurrageApplied {
  string account       = 1;
  string amount_levied = 2 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false
  ];
  string new_balance = 3 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false
  ];
}
