syntax = "proto3";
package cosmos.demurrage.v1;

option go_package = "github.com/cosmos/cosmos-sdk/x/demurrage/types";

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/demurrage/v1/demurrage.proto";

// Msg defines the demurrage module's Msg service.
// The only user-facing message is MsgUpdateParams, which is governance-gated.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams updates the demurrage module parameters.
  // The authority is typically the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type for the demurrage module.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name)           = "cosmos-sdk/x/demurrage/MsgUpdateParams";

  // authority is the address of the governance module account.
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the x/demurrage parameters to update.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a MsgUpdateParams message.
message MsgUpdateParamsResponse {}
